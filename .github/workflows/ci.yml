name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Maven tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run service unit tests
        run: mvn -B test

      - name: Run exec-runner client tests
        run: mvn -B test -f client/pom.xml

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: content-scanner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Check formatting
        run: terraform fmt -check

      - name: Init providers
        run: terraform init -backend=false

      - name: Validate configuration
        run: terraform validate

  kubernetes:
    name: Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate local overlay
        run: |
          kubectl kustomize k8s/overlays/local | kubeconform -summary -kubernetes-version 1.29.0 -

      - name: Validate GHCR overlay
        run: |
          kubectl kustomize k8s/overlays/ghcr | kubeconform -summary -kubernetes-version 1.29.0 -
