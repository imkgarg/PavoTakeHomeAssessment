apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-scanner
  namespace: sandbox-namespace
  labels:
    app: content-scanner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: content-scanner
  template:
    metadata:
      labels:
        app: content-scanner
    spec:
      containers:
        - name: content-scanner
          image: content-scanner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: SCAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: content-scanner-api-key
                  key: SCAN_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
