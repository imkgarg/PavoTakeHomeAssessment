apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - exec-runner-example.yaml

patches:
  - target:
      kind: NetworkPolicy
      name: content-scanner
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: content-scanner
